<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado 2º Ano</title>
<style>
body{font-family:Arial;margin:0;background:#eef2f7}
header{background:#2c3e50;color:#fff;padding:15px;text-align:center}
section{background:#fff;margin:15px;padding:20px;border-radius:10px}
button{padding:10px;border:none;border-radius:5px;background:#2c3e50;color:#fff;cursor:pointer}
.progress{height:20px;background:#ccc;border-radius:10px;overflow:hidden}
.progress-bar{height:100%;width:0;background:green}
.img-box{display:flex;justify-content:center;margin-top:10px}
.img-box img{width:220px;border-radius:10px;transition:0.3s}
</style>
</head>
<body>

<header>
<h1>Simulado Interativo - 2º Ano</h1>
<p>Pontuação: <span id="pontos">0</span></p>
<p>Tempo: <span id="tempo">60</span>s</p>
<button onclick="iniciarProva()">▶️ Iniciar Prova</button>
<div class="progress"><div class="progress-bar" id="barra"></div></div>
</header>

<section>
<h2 id="materia"></h2>
<p id="pergunta"></p>
<input type="text" id="resposta" placeholder="Digite sua resposta">
<br><br>
<button onclick="responder()">Responder</button>
<p id="feedback"></p>
<p id="dica" style="color:orange"></p>

<div class="img-box">
<img id="imagem" src="" alt="imagem">
</div>
</section>

<script>
let imagens = [
"https://i.imgur.com/8Km9tLL.jpg",
"https://i.imgur.com/5qH6G6F.jpg",
"https://i.imgur.com/3ZQ3Z6X.jpg",
"https://i.imgur.com/Vb5YQ9G.jpg"],

let imgAcerto = "https://i.imgur.com/4AiXzf8.jpeg"; // macaco feliz
let imgErro = "https://i.imgur.com/ZcLLrkY.jpeg"; // macaco meme triste

// imagens aleatórias continuam abaixo

"https://i.imgur.com/1.jpg",
"https://i.imgur.com/2.jpg",
"https://i.imgur.com/3.jpg",
"https://i.imgur.com/4.jpg"
];

let imgAcerto = "https://i.imgur.com/OK.png";
let imgErro = "https://i.imgur.com/ERRO.png";

let perguntas = [
{materia:"Matemática",pergunta:"Quanto é 5²?",resposta:"25",dica:"5x5"},
{materia:"Matemática",pergunta:"Quanto é 10 + 15?",resposta:"25",dica:"Soma"},
{materia:"Português",pergunta:"Plural de papel:",resposta:"papeis",dica:"Termina com is"},
{materia:"Biologia",pergunta:"Órgão que bombeia sangue:",resposta:"coracao",dica:"Fica no peito"},
{materia:"Química",pergunta:"NaCl é:",resposta:"sal",dica:"Tem na comida"},
{materia:"Física",pergunta:"Unidade de força:",resposta:"newton",dica:"Cientista"}
];

let atual = 0;
let pontos = 0;
let tempo = 60;
let timer;

function imagemAleatoria(){
let img = imagens[Math.floor(Math.random()*imagens.length)];
document.getElementById('imagem').src = img;
}

function carregar(){
let p = perguntas[atual];
document.getElementById('materia').innerText = p.materia;
document.getElementById('pergunta').innerText = p.pergunta;
document.getElementById('resposta').value = '';
document.getElementById('feedback').innerText='';
document.getElementById('dica').innerText='';

imagemAleatoria();

let progresso = (atual/perguntas.length)*100;
document.getElementById('barra').style.width = progresso+'%';
}

function responder(){
let resp = document.getElementById('resposta').value.toLowerCase().trim();
let correta = perguntas[atual];

if(resp === correta.resposta){
pontos++;
document.getElementById('feedback').innerText = '✔️ Acertou!';
document.getElementById('imagem').src = imgAcerto;
}else{
document.getElementById('feedback').innerText = '❌ Errou!';
document.getElementById('dica').innerText = 'Dica: '+correta.dica;
document.getElementById('imagem').src = imgErro;
}

document.getElementById('pontos').innerText = pontos;

atual++;
if(atual < perguntas.length){
setTimeout(carregar,1000);
}else{
clearInterval(timer);
alert('Fim! Pontuação: '+pontos);
}
}

function iniciarProva(){
perguntas.sort(()=>Math.random()-0.5);
carregar();
clearInterval(timer);

timer = setInterval(()=>{
tempo--;
document.getElementById('tempo').innerText = tempo;
if(tempo<=0){
clearInterval(timer);
alert('Tempo esgotado!');
location.reload();
}
},1000);
}

// ENTER responde
document.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    responder();
  }
});

</script>

</html>
